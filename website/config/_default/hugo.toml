title = "GDG"
baseurl = "https://software.es.net/gdg/"
canonifyurls = false

relativeURLs = false

disableAliases = true
disableHugoGeneratorInject = true
# disableKinds = ["taxonomy", "term"]
enableEmoji = true
enableGitInfo = false
enableRobotsTXT = true
languageCode = "en-US"
[pagination]
pagerSize = 10
rssLimit = 10
summarylength = 20 # 70 (default)

# Multilingual
defaultContentLanguage = "en"
disableLanguages = ["de", "nl"]
defaultContentLanguageInSubdir = false

copyRight = ""

[build.buildStats]
enable = true

[outputs]
home = ["html", "rss", "sitemap", "searchIndex", "llms"]
page = ["html", "markdown"]
section = ["html", "rss", "sitemap"]
taxonomy = ["html", "rss", "sitemap"]
term = ["html", "rss", "sitemap"]

[outputFormats.searchIndex]
mediaType = "application/json"
baseName = "search-index"
isPlainText = true
notAlternative = true

[outputFormats.markdown]
baseName = "index"
isHTML = false
isPlainText = true
mediaType = "text/markdown"

[outputFormats.llms]
baseName = "llms"
isHTML = false
isPlainText = true
mediaType = "text/plain"

[sitemap]
changefreq = "monthly"
filename = "sitemap.xml"
priority = 0.5

[caches]
[caches.getresource]
dir = ":cacheDir/:project"
maxAge = -1 # "30m"

[taxonomies]
contributor = "contributors"
category = "categories"
tag = "tags"

[permalinks]
blog = "/blog/:slug/"
docs = "/docs/:sections[1:]/:slug/"
# docs = "/docs/1.0/:sections[1:]/:slug/"

[minify.tdewolff.html]
keepWhitespace = false

[related]
threshold = 80
includeNewer = true
toLower = false
[[related.indices]]
name = "categories"
weight = 100
[[related.indices]]
name = "tags"
weight = 80
[[related.indices]]
name = "date"
weight = 10

[imaging]
anchor = "Center"
bgColor = "#ffffff"
hint = "photo"
quality = 85
resampleFilter = "Lanczos"
